services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telegram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram}
      POSTGRES_DB: telegram
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram"]
      interval: 5s
      timeout: 3s
      retries: 10

  sync:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      DATABASE_URL: postgresql://telegram:${POSTGRES_PASSWORD:-telegram}@postgres:5432/telegram
      DIALOG_LIMIT: ${DIALOG_LIMIT:-200}
      INITIAL_SYNC_LIMIT: ${INITIAL_SYNC_LIMIT:-500}
      RECONCILE_INTERVAL: ${RECONCILE_INTERVAL:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      XAI_API_KEY: ${XAI_API_KEY:-}
      XAI_MODEL: ${XAI_MODEL:-grok-4.3}
      MAX_IMAGE_BYTES: ${MAX_IMAGE_BYTES:-10485760}
    volumes:
      - session:/data
    ports:
      - "127.0.0.1:8082:8082"
    restart: unless-stopped

volumes:
  pgdata:
  session:
