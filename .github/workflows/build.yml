name: build

# Builds the telegram-sync daemon image and publishes it to ghcr.io so AttestMesh
# node CVMs can pull it (deployed by teemesh deploy/telegram-sync-node.sh).
on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/attestmesh/telegram-sync:latest
            ghcr.io/attestmesh/telegram-sync:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
